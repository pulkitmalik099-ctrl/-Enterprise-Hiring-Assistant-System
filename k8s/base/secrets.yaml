apiVersion: v1
kind: Secret
metadata:
  name: hiring-secrets
type: Opaque
stringData:
  # NOTE: Change these values in production!
  # Use sealed-secrets or external-secrets for secure management
  database-url: "postgresql://hiring_user:hiring_password@postgres:5432/hiring_db"
  redis-url: "redis://redis:6379/0"
  anthropic-api-key: "sk-ant-YOUR_KEY_HERE"
  openai-api-key: "sk-YOUR_KEY_HERE"
  secret-key: "your-secret-key-change-in-production-32chars"
  jwt-secret: "your-jwt-secret-change-in-production"
---
apiVersion: v1
kind: Secret
metadata:
  name: postgresql-secret
type: Opaque
stringData:
  username: "hiring_user"
  password: "hiring_password"
  db-name: "hiring_db"
---
