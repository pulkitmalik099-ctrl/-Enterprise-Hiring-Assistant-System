apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: hiring

resources:
- backend-deployment.yaml
- backend-service.yaml
- frontend-deployment.yaml
- frontend-service.yaml
- ingress.yaml
- configmap.yaml
- secrets.yaml
- hpa.yaml
- network-policies.yaml

commonLabels:
  app.kubernetes.io/name: hiring-assistant
  app.kubernetes.io/version: v1
  app.kubernetes.io/part-of: enterprise-hiring
  managed-by: kustomize

commonAnnotations:
  description: Enterprise Hiring Assistant System
  author: Pulkit Malik

replicas:
- name: hiring-backend
  count: 3
- name: hiring-frontend
  count: 2

images:
- name: ghcr.io/pulkitmalik099-ctrl/enterprise-hiring-assistant
  newTag: latest
- name: ghcr.io/pulkitmalik099-ctrl/enterprise-hiring-assistant-frontend
  newTag: latest
